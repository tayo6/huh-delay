name: Build VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JUCE_TAG: 7.0.12
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
          - name: macOS
            os: macos-13
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout JUCE ${{ env.JUCE_TAG }}
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: ${{ env.JUCE_TAG }}
          path: JUCE

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Select CMake generator
        id: generator
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "args=" >> "$GITHUB_OUTPUT"
          else
            echo "args=-G Ninja" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache JUCE build artefacts
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ env.JUCE_TAG }}-${{ hashFiles('CMakeLists.txt', 'Source/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.JUCE_TAG }}-

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build ${{ steps.generator.outputs.args }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        shell: bash
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Locate built VST3
        shell: bash
        run: |
          echo "Searching for .vst3 bundle..."
          find build -iname "*.vst3" -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: HUH_Delay-VST3-${{ matrix.name }}
          path: build/**/*.vst3
          if-no-files-found: error
          retention-days: 14