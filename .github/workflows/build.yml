name: Build VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JUCE_TAG: 7.0.12
  BUILD_TYPE: Release

jobs:
  build:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout JUCE ${{ env.JUCE_TAG }}
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: ${{ env.JUCE_TAG }}
          path: JUCE

      # Default CMake generator on windows-latest is Visual Studio, which
      # needs no extra PATH setup for cl.exe/MSBuild - most reliable option
      # for CI, so no generator flag / no msvc-dev-cmd step needed here.
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: windows-build-${{ env.JUCE_TAG }}-${{ hashFiles('CMakeLists.txt', 'Source/**') }}
          restore-keys: |
            windows-build-${{ env.JUCE_TAG }}-

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        shell: bash
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Locate built VST3
        shell: bash
        run: |
          echo "Searching for .vst3 bundle..."
          find build -iname "*.vst3" -print

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: HUH_Delay-VST3-Windows
          path: build/**/*.vst3
          if-no-files-found: error
          retention-days: 14